name: APIEndpoint
version: "1.0.0"
core: false
abstract: false
description: |
  An HTTP operation exposed to external consumers. The authoritative
  definition of what callers may invoke, what they must provide, and
  what they will receive in return.

properties:
  $defs:
    HttpMethod:
      type: string
      enum:
        - GET
        - PUT
        - POST
        - DELETE
        - OPTIONS
        - HEAD
        - PATCH
        - TRACE
    SchemaNodeRef:
      type: string
      description: "Node ID of a Schema that owns the request or response fields"
      examples:
        - create-order-request
        - order-response

  type: object
  additionalProperties: false
  required:
    - method
    - path
    - responses
  properties:
    method:
      $ref: "#/$defs/HttpMethod"
      description: "HTTP method"
      examples:
        - GET
        - POST
    path:
      type: string
      pattern: "^/"
      description: "URL path pattern, for example /orders/{orderId}"
      examples:
        - /orders
        - /orders/{orderId}
    request:
      $ref: "#/$defs/SchemaNodeRef"
      description: "Optional schema node describing the request body"
    responses:
      type: object
      minProperties: 1
      propertyNames:
        pattern: "^(default|[1-5][0-9]{2})$"
      additionalProperties:
        $ref: "#/$defs/SchemaNodeRef"
      description: "Response schema node IDs keyed by HTTP status code or default"
      examples:
        - "200": order-response
        - "201": order-created-response
          "404": problem-response

edges:
  outgoing:
    - calls
    - produces
  supports:
    - reads

ui:
  icon: api-endpoint
  colour: "#4A90D9"
  displayProperties:
    - method
    - path
  badge: method
