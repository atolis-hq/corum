name: APIEndpoint
info:
  version: "1.0.0"
  core: false
  abstract: false
  description: |
    An HTTP operation exposed to external consumers. The authoritative
    definition of what callers may invoke, what they must provide, and
    what they will receive in return.

    Schemas may be defined in a schemas block within the node file (for
    schemas specific to this endpoint) or as standalone Schema node files
    (for schemas shared across multiple endpoints or nodes). Enums follow
    the same pattern via the enums block.

    Inline schemas and enums are intentionally flat at the field level.
    Nested object types are expressed through objectRef references to another
    local schema by name, a local enum by name, or a global node ID.

    Reference resolution order for objectRef, request, and responses values:
      1. Local schemas block — resolved to {node-id}.schemas.{local-name}
      2. Local enums block  — resolved to {node-id}.enums.{local-name}
      3. Global node ID     — resolved against the graph; generates a reads edge

    has-field and has-value edges to locally-defined schemas and enums are
    implied by structure and extracted automatically. Maps-to edges connecting
    fields across node boundaries are always declared explicitly in edge files.

properties:
  type: object
  additionalProperties: false
  required:
    - method
    - path
    - responses
  properties:

    method:
      type: string
      enum:
        - GET
        - PUT
        - POST
        - DELETE
        - OPTIONS
        - HEAD
        - PATCH
        - TRACE
      description: "HTTP method for this operation"

    path:
      type: string
      pattern: "^/"
      description: "URL path pattern, for example /orders/{orderId}"
      examples:
        - /orders
        - /orders/{orderId}

    description:
      type: string
      description: "Human-readable summary of what this operation does"

    parameters:
      type: object
      description: |
        Map of parameter name to parameter definition. Covers path, query,
        and header parameters. Location (path/query/header) is declared on
        each entry. Cookie parameters are not modelled.
      additionalProperties:
        type: object
        additionalProperties: false
        required:
          - location
          - required
        properties:
          location:
            type: string
            enum:
              - path
              - query
              - header
          type:
            type: string
            enum:
              - uuid
              - string
              - integer
              - decimal
              - boolean
              - datetime
              - date
              - time
          required:
            type: boolean
          collection:
            type: string
            enum:
              - one
              - array
            description: "Collection shape. Defaults to 'one' when absent."

    request:
      type: string
      format: node-ref
      description: |
        Local schema ref ('#/schemas/<name>') or global node ID describing
        the request body. Omit for operations with no body (e.g. GET, DELETE).
      examples:
        - "'#/schemas/create-order-request'"

    responses:
      type: object
      minProperties: 1
      description: |
        Map of HTTP status code (or 'default') to a local schema ref
        ('#/schemas/<name>') or global node ID describing the response body.
      propertyNames:
        pattern: "^(default|[1-5][0-9]{2})$"
      additionalProperties:
        type: string
        format: node-ref
      examples:
        - "200": "'#/schemas/order-response'"

# schemas: and enums: inherited from base (_base.yaml)

edge-types:
  outgoing:
    - reads
    - calls
    - produces
  incoming:
    - triggers

ui:
  icon: plug
  colour: "#4A90D9"
  displayName: API Endpoint
  displayProperties:
    - method
    - path
  badge: method
