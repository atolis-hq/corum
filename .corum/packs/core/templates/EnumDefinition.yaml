name: EnumDefinition
version: "1.0.0"
core: false
abstract: false
description: |
  A named set of discrete values. EnumDefinition is the boundary node for an
  enumerated type; the actual constants are represented as owned EnumValue nodes
  rather than inline strings. This preserves independent addressability for each
  value — every value can carry its own state, stability, deprecation reason,
  and threads.

  EnumDefinition carries no properties of its own beyond the universal node
  properties. Its shape is entirely expressed through the EnumValue nodes it
  owns via has-value edges.

  When an EnumDefinition is defined inline within a cluster file (in the enums
  block of an APIEndpoint, or within a DomainModel or ValueObject cluster), the
  has-value edges to its values are implied by structure and extracted
  automatically. Standalone EnumDefinition cluster files are used for enum types
  shared across multiple nodes.

properties:
  type: object
  additionalProperties: false

edges:
  outgoing:
    - has-value

ui:
  icon: enum-definition
  colour: "#8B6A9A"
  displayProperties: []
