name: Schema
info:
  version: "1.0.0"
  core: true
  role: type-container
  abstract: false
  description: |
    A reusable object-shaped contract that owns Field nodes. Schema is the
    boundary for a structured payload or type; all actual properties are
    represented as Field nodes rather than inline objects.

    When fields are defined inline within a Schema cluster file, has-field edges
    are implied by structure and extracted automatically. Standalone Schema nodes
    referenced by node ID from another node (e.g. an APIEndpoint via objectRef)
    generate an explicit uses-type edge.

properties:
  type: object
  additionalProperties: false
  properties:
    description:
      type: string
      description: "Human-readable description of what this schema represents"

fields:
  item-template: Field
  description: |
    Owned Field nodes for this schema. Each entry becomes a Field node with
    ID {node-id}.fields.{field-name}. has-field edges are implied by position.

mappings:
  item-template: Mapping
  description: |
    Locally scoped Mapping nodes owned by this schema. Each entry becomes a
    Mapping node with ID {node-id}.mappings.{local-name}.

edge-types:
  outgoing:
    - has-field
    - uses-type

ui:
  icon: layer-group
  colour: "#5D7A8C"
  displayName: Schema
  displayProperties:
    - description
