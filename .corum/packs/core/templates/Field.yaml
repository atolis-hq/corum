name: Field
info:
  version: "1.0.0"
  core: true
  abstract: false
  description: |
    A named property within a Schema node. Fields are the atomic unit of
    field-level lineage — independently addressable and connectable to
    fields in other nodes via maps-to edges. The field name is the node
    label; it is not a property on this node.

    A field's type is either a primitive scalar (scalarType) or a reference
    to another node that defines the type's shape (objectRef). These are
    mutually exclusive. objectRef covers all structured types: Schema,
    EnumDefinition, ValueObject, and DomainModel.

    When a Field is defined inline within a Schema, EnumDefinition, or
    APIEndpoint node file, the has-field edge from the parent to this Field
    is implied by structure and extracted automatically. Maps-to edges are
    always declared explicitly as they cross node boundaries.

properties:
  type: object
  additionalProperties: false
  required:
    - nullable
    - cardinality
  properties:
    scalarType:
      type: string
      enum:
        - uuid
        - string
        - integer
        - decimal
        - boolean
        - datetime
        - date
        - time
      description: "Primitive scalar type. Mutually exclusive with objectRef."
    objectRef:
      type: string
      description: |
        Node ID of a Schema, EnumDefinition, ValueObject, or DomainModel that
        defines the shape of this field. In APIEndpoint and other cluster files
        that support inline definitions, this may also be a local name from the
        schemas or enums block, resolved local-first before global lookup.
        Mutually exclusive with scalarType.
    nullable:
      type: boolean
      description: "Whether this field may be absent or null"
    cardinality:
      type: string
      enum:
        - one
        - many
      description: "Whether this field holds a single value or a collection"
  oneOf:
    - required:
        - scalarType
      not:
        required:
          - objectRef
    - required:
        - objectRef
      not:
        required:
          - scalarType

edge-types:
  incoming:
    - has-field
  supports:
    - maps-to
    - derived-from

ui:
  icon: minus
  colour: "#888888"
  displayProperties:
    - scalarType
    - objectRef
    - nullable
    - cardinality
