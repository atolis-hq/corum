name: Field
info:
  version: "1.0.0"
  core: true
  abstract: false
  description: |
    A named property within a Schema node. Fields are the atomic unit of
    field-level lineage — independently addressable and connectable to
    fields in other nodes via maps-to edges. The field name is the node
    label; it is not a property on this node.

    A field's type is either a primitive scalar (type) or a reference
    to another node that defines the type's shape ($ref). These are
    mutually exclusive. $ref covers all structured types: Schema,
    EnumDefinition, ValueObject, and DomainModel.

    When a Field is defined inline within a Schema, EnumDefinition, or
    APIEndpoint node file, the has-field edge from the parent to this Field
    is implied by structure and extracted automatically. Maps-to edges are
    always declared explicitly as they cross node boundaries.

properties:
  type: object
  additionalProperties: false
  required:
    - nullable
    - cardinality
  properties:
    type:
      type: string
      enum:
        - uuid
        - string
        - integer
        - decimal
        - boolean
        - datetime
        - date
        - time
      description: "Primitive scalar type. Mutually exclusive with $ref."
    $ref:
      type: string
      format: node-ref
      description: |
        Reference to the node defining this field's type.
        Local schema: '#/schemas/<name>'
        Local enum:   '#/enums/<name>'
        Global node:  bare node ID (e.g. orders.DomainModel.order)
        Mutually exclusive with type.
    nullable:
      type: boolean
      description: "Whether this field may be absent or null"
    cardinality:
      type: string
      enum:
        - one
        - many
      description: "Whether this field holds a single value or a collection"
    keyed:
      type: boolean
      description: "Whether this collection is keyed by a string (map/dictionary). Only valid when cardinality is 'many'."
  if:
    properties:
      keyed:
        const: true
    required:
      - keyed
  then:
    properties:
      cardinality:
        const: many
  oneOf:
    - required:
        - type
      not:
        required:
          - $ref
    - required:
        - $ref
      not:
        required:
          - type

edge-types:
  incoming:
    - has-field
  supports:
    - maps-to
    - derived-from

ui:
  icon: minus
  colour: "#888888"
  displayName: Field
  displayProperties:
    - type
    - $ref
    - nullable
    - cardinality
