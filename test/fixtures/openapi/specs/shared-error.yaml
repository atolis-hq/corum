openapi: '3.0.3'
info:
  title: Shared Error API
  version: '1.0'
components:
  schemas:
    ApiError:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
paths:
  /orders/create:
    post:
      operationId: createOrder
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
                    format: uuid
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /payments/capture:
    post:
      operationId: capturePayment
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [paymentId]
                properties:
                  paymentId:
                    type: string
                    format: uuid
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
