openapi: '3.0.3'
info:
  title: Orders API
  version: '1.0'
paths:
  /orders/create:
    post:
      operationId: createOrder
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customerId]
              properties:
                customerId:
                  type: string
                  format: uuid
                notes:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [orderId]
                properties:
                  orderId:
                    type: string
                    format: uuid
