asyncapi: 3.0.0
info:
  title: Message Naming
  version: 1.0.0
channels:
  subscriptions.subscription-renewed:
    address: subscriptions.subscription-renewed
    messages:
      event:
        name: SubscriptionRenewed.v2
        payload:
          type: object
          required: [subscriptionId]
          properties:
            subscriptionId:
              type: string
              format: uuid
operations:
  subscription-renewed:
    action: send
    channel:
      $ref: '#/channels/subscriptions.subscription-renewed'
    messages:
      - $ref: '#/channels/subscriptions.subscription-renewed/messages/event'
