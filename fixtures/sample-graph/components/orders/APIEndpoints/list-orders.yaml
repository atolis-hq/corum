id: orders.APIEndpoint.list-orders
template: APIEndpoint
component: orders
state: agreed
stability: stable
schemaVersion: "1"
lastModifiedAt: "2026-04-23"

properties:
  method: GET
  path: /orders
  responses:
    "200": '#/schemas/order-summary-response'
    "400": shared.Schema.problem-detail

schemas:
  order-summary-response:
    description: Lightweight order summary for list queries
    fields:
      orderId:
        type: uuid
        nullable: false
        cardinality: one
      customerId:
        type: uuid
        nullable: false
        cardinality: one
      status:
        $ref: orders.DomainModel.order.enums.order-status
        nullable: false
        cardinality: one
      totalAmount:
        type: decimal
        nullable: false
        cardinality: one
