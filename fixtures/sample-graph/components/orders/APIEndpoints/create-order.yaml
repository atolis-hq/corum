id: orders.APIEndpoint.create-order
template: APIEndpoint
component: orders
state: agreed
stability: stable
schemaVersion: "1"
lastModifiedAt: "2026-04-17"

properties:
  method: POST
  path: /orders
  request: '#/schemas/create-order-request'
  responses:
    "201": '#/schemas/create-order-response'
    "400": shared.Schema.problem-detail
    "409": shared.Schema.problem-detail

schemas:
  create-order-request:
    description: Request body for creating an order
    fields:
      customerId:
        type: uuid
        nullable: false
        cardinality: one
      items:
        $ref: '#/schemas/order-line-item'
        nullable: false
        cardinality: many
      notes:
        type: string
        nullable: true
        cardinality: one

  order-line-item:
    description: A single line item within the order
    fields:
      productId:
        type: uuid
        nullable: false
        cardinality: one
      quantity:
        type: integer
        nullable: false
        cardinality: one
      unitPrice:
        state: draft
        type: decimal
        nullable: false
        cardinality: one

  create-order-response:
    description: Confirmed order details returned on successful creation
    fields:
      orderId:
        type: uuid
        nullable: false
        cardinality: one
      status:
        $ref: '#/enums/order-status'
        nullable: false
        cardinality: one
      customerId:
        type: uuid
        nullable: false
        cardinality: one
      items:
        $ref: '#/schemas/order-line-item'
        nullable: false
        cardinality: many
      totalAmount:
        type: decimal
        nullable: false
        cardinality: one

enums:
  order-status:
    description: Lifecycle state of an order as visible to API consumers
    values:
      pending:
        name: PENDING
        description: Order received, awaiting processing
      confirmed:
        name: CONFIRMED
        description: Order accepted and confirmed by the system
      cancelled:
        name: CANCELLED
        description: Order cancelled before fulfilment
