id: orders.APIEndpoint.get-order
template: APIEndpoint
schemaVersion: "1"

metadata:
  component: orders
  state: agreed
  stability: stable
  lastModifiedAt: "2026-04-23"

properties:
  method: GET
  path: /orders/{orderId}
  responses:
    "200": '#/schemas/order-response'
    "400": shared.Schema.problem-detail
    "404": shared.Schema.problem-detail

schemas:
  order-response:
    description: Full order details for a single-order query
    fields:
      orderId:
        type: uuid
        nullable: false
      customerId:
        type: uuid
        nullable: false
      status:
        $ref: orders.DomainModel.order.enums.order-status
        nullable: false
      items:
        $ref: '#/schemas/order-line-item'
        nullable: false
        collection: array
      totalAmount:
        type: decimal
        nullable: false
      notes:
        type: string
        nullable: true
      createdAt:
        type: datetime
        nullable: false

  order-line-item:
    description: A single line item within the order
    fields:
      productId:
        type: uuid
        nullable: false
      quantity:
        type: integer
        nullable: false
      unitPrice:
        type: decimal
        nullable: false
