id: orders.ReadModel.order-detail
template: ReadModel
schemaVersion: "1"

metadata:
  component: orders
  state: agreed
  stability: stable
  lastModifiedAt: "2026-04-23"

schemas:
  order-detail:
    description: Full order view for single-order queries
    fields:
      id:
        type: uuid
        nullable: false
      customerId:
        type: uuid
        nullable: false
      status:
        $ref: orders.DomainModel.order.enums.order-status
        nullable: false
      items:
        $ref: '#/schemas/order-line-item'
        nullable: false
        collection: array
      totalAmount:
        type: decimal
        nullable: false
      notes:
        type: string
        nullable: true
      createdAt:
        type: datetime
        nullable: false

  order-line-item:
    description: A single line item within the order
    fields:
      productId:
        type: uuid
        nullable: false
      quantity:
        type: integer
        nullable: false
      unitPrice:
        state: proposed
        type: decimal
        nullable: false