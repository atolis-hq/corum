<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Corum — Wireframes</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="wire.css" />
<script>
    (function(){
      try {
        var t = localStorage.getItem('corum_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
        document.addEventListener('DOMContentLoaded', function(){ document.body.setAttribute('data-theme', t); });
      } catch(e){}
    })();
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components -->
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="tab_overview.jsx"></script>
  <script type="text/babel" src="tab_components.jsx"></script>
  <script type="text/babel" src="tab_perspective.jsx"></script>
  <script type="text/babel" src="tab_branching.jsx"></script>
  <script type="text/babel" src="tab_journeys.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
